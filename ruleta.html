<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruleta de la Suerte</title>
    <!-- Icono del navegador (Favicon) -->
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎡</text></svg>">
    <!-- Confetti.js para la animación de victoria -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* Diseño claro, minimalista y limpio (Light Mode) */
        :root {
            --primary: #3B82F6;
            /* Azul clásico */
            --primary-hover: #2563EB;
            --bg-color: #F8FAFC;
            /* Fondo principal muy claro (casi blanco) */
            --panel-bg: #FFFFFF;
            /* Paneles blancos */
            --text-color: #334155;
            /* Texto gris oscuro */
            --border-color: #E2E8F0;
            --border-radius: 12px;
        }

        * {
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            /* Apilar titulo arriba */
            justify-content: center;
            align-items: center;
            overflow: hidden;
            /* Evitar scroll */
        }

        /* --- Título y Cabecera --- */
        .app-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .app-icon {
            font-size: 3.5rem;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .app-header h1 {
            margin: 0;
            font-size: 2.8rem;
            font-weight: 800;
            color: var(--text-color);
            letter-spacing: -1px;
        }

        .app-header h1 span {
            color: var(--primary);
        }

        .container {
            display: flex;
            width: 95%;
            max-width: 1250px;
            height: 75vh;
            /* Reducido de 85vh a 75vh para acomodar el header superior */
            background-color: var(--panel-bg);
            border-radius: var(--border-radius);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            overflow: hidden;
            flex-direction: row;
            border: 1px solid var(--border-color);
            gap: 20px;
            /* Seperacion extra opcional */
        }

        /* Responsive */
        @media (max-width: 800px) {
            .container {
                flex-direction: column;
                height: 95vh;
            }
        }

        /* --- Panel Lateral Izquierdo (Opciones) --- */
        .sidebar {
            width: 320px;
            flex-shrink: 0;
            /* Evitar que se encoja y empuje al boton fuera de su sitio */
            padding: 30px;
            background-color: #F8FAFC;
            /* un tono ligerísimamente gris para diferenciar del blanco puro */
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
        }

        @media (max-width: 800px) {
            .sidebar {
                width: 100%;
                height: 45%;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
                padding: 20px;
            }
        }

        .sidebar h2 {
            margin-top: 0;
            font-size: 1.5rem;
            color: var(--text-color);
            margin-bottom: 20px;
            font-weight: 600;
        }

        .input-group {
            display: flex;
            margin-bottom: 20px;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            border-radius: 6px;
            width: 100%;
            /* Forzar caja contenedor seguro */
        }

        input[type="text"] {
            flex: 1;
            min-width: 0;
            /* <--- Esto es clave: permite encoger el input si falta espacio */
            padding: 12px 14px;
            border: 1px solid var(--border-color);
            border-radius: 6px 0 0 6px;
            background-color: #FFFFFF;
            color: var(--text-color);
            outline: none;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
        }

        button.add-btn {
            padding: 0 20px;
            border: 1px solid var(--primary);
            border-radius: 0 6px 6px 0;
            background-color: var(--primary);
            color: white;
            cursor: pointer;
            transition: background-color 0.2s;
            font-weight: 500;
            font-size: 0.95rem;
        }

        button.add-btn:hover {
            background-color: var(--primary-hover);
        }

        ul.options-list {
            list-style: none;
            padding: 0;
            margin: 0;
            overflow-y: auto;
            flex: 1;
        }

        ul.options-list li {
            background-color: #FFFFFF;
            padding: 10px 14px;
            margin-bottom: 8px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border-color);
            animation: slideIn 0.2s ease-out forwards;
        }

        ul.options-list li .item-text {
            word-wrap: break-word;
            flex: 1;
            padding-right: 10px;
            font-size: 0.95rem;
        }

        ul.options-list li button.remove-btn {
            background: none;
            border: none;
            color: #EF4444;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 5px;
        }

        ul.options-list li button.remove-btn:hover {
            color: #B91C1C;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* --- Panel Principal (La Ruleta) --- */
        .main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 50px;
            background-color: #FFFFFF;
        }

        .wheel-wrapper {
            position: relative;
            width: 460px;
            height: 460px;
            flex-shrink: 0;
            /* Evita que CSS flex aplaste la caja hacia dentro deformando en ovalo */
        }

        @media (max-width: 800px) {
            .wheel-wrapper {
                width: 320px;
                height: 320px;
            }
        }

        #wheelCanvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            /* Sombra mucho más suave */
            transition: transform cubic-bezier(0.1, 0.9, 0.2, 1);
            transform: rotate(0deg);
        }

        /* El Indicador/Puntero */
        .pointer {
            position: absolute;
            top: 50%;
            right: -20px;
            transform: translateY(-50%);
            width: 0;
            height: 0;
            border-top: 18px solid transparent;
            border-bottom: 18px solid transparent;
            border-right: 36px solid #EF4444;
            filter: drop-shadow(-2px 2px 3px rgba(0, 0, 0, 0.15));
            z-index: 10;
        }

        /* Botón Central de Giro */
        .spin-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 5px solid #FFFFFF;
            background-color: var(--primary);
            color: white;
            font-weight: 700;
            font-size: 1.2rem;
            cursor: pointer;
            z-index: 5;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
            transition: transform 0.1s, background-color 0.2s;
        }

        .spin-btn:hover:not(:disabled) {
            background-color: var(--primary-hover);
            transform: translate(-50%, -50%) scale(1.05);
        }

        .spin-btn:active:not(:disabled) {
            transform: translate(-50%, -50%) scale(0.95);
        }

        .spin-btn:disabled {
            background-color: #CBD5E1;
            color: #64748B;
            cursor: not-allowed;
            transform: translate(-50%, -50%);
            box-shadow: none;
        }

        /* --- Modal de Ganador --- */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            /* Oscurecemos un poco el fondo para contraste */
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background-color: #FFFFFF;
            padding: 40px 30px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            max-width: 400px;
            width: 90%;
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }

        .modal.active .modal-content {
            transform: translateY(0);
        }

        .modal-content h2 {
            margin-top: 0;
            color: var(--text-color);
            font-size: 1.8rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .modal-content p {
            font-size: 1.5rem;
            margin-bottom: 30px;
            color: var(--primary);
            font-weight: 600;
        }

        .modal-btn {
            padding: 12px 28px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .modal-btn:hover {
            background-color: var(--primary-hover);
        }
    </style>
</head>

<body>

    <!-- Cabecera Principal -->
    <header class="app-header">
        <div class="app-icon">🎡</div>
        <h1>La Ruleta <span>de la Suerte</span></h1>
    </header>

    <div class="container">
        <!-- Panel Izquierdo: Lista y Controles -->
        <div class="sidebar">
            <h2>Opciones</h2>
            <div class="input-group">
                <!-- Se eliminó (Ej: Tema 4) a petición -->
                <input type="text" id="optionInput" placeholder="Añadir opción..." aria-label="Nueva opción"
                    autocomplete="off" />
                <button id="addBtn" class="add-btn">Añadir</button>
            </div>
            <ul class="options-list" id="optionList"></ul>
        </div>

        <!-- Panel Derecho: La Ruleta Visual -->
        <div class="main">
            <div class="wheel-wrapper">
                <canvas id="wheelCanvas" width="800" height="800"></canvas>
                <div class="pointer"></div>
                <button id="spinBtn" class="spin-btn">GIRAR</button>
            </div>
        </div>
    </div>

    <!-- Modal de Resultado (Pop-up) -->
    <div id="winnerModal" class="modal">
        <div class="modal-content">
            <h2>¡Tenemos un ganador!</h2>
            <p id="winnerText"></p>
            <button id="closeModalBtn" class="modal-btn">Continuar</button>
        </div>
    </div>

    <script>
        // Referencias al DOM
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spinBtn');
        const addBtn = document.getElementById('addBtn');
        const optionInput = document.getElementById('optionInput');
        const optionList = document.getElementById('optionList');
        const winnerModal = document.getElementById('winnerModal');
        const winnerText = document.getElementById('winnerText');
        const closeModalBtn = document.getElementById('closeModalBtn');

        // Estado principal
        let options = [];
        let currentRotation = 0;
        let isSpinning = false;
        let winningIndexForRemoval = -1;

        // Paleta de colores estándar (menos chillonas, adaptadas al Light Mode)
        const colors = [
            '#EF4444', '#F97316', '#EAB308', '#10B981',
            '#06B6D4', '#3B82F6', '#8B5CF6', '#EC4899',
            '#14B8A6', '#84CC16'
        ];

        // Lógica tramposa
        const riggedPatterns = /^(4|tema\s*4|t\.?\s*4|cuatro|u4|tema\s*cuatro)$/i;

        // Renderiza la lista
        function renderList() {
            optionList.innerHTML = '';
            options.forEach((opt, index) => {
                const li = document.createElement('li');

                const textSpan = document.createElement('span');
                textSpan.className = 'item-text';
                textSpan.textContent = `${index + 1}. ${opt}`;

                const removeBtn = document.createElement('button');
                removeBtn.innerHTML = '&times;';
                removeBtn.className = 'remove-btn';
                removeBtn.title = 'Eliminar';
                removeBtn.onclick = () => {
                    if (isSpinning) return;
                    options.splice(index, 1);
                    renderList();
                    drawWheel();
                };

                li.appendChild(textSpan);
                li.appendChild(removeBtn);
                optionList.appendChild(li);
            });
        }

        // Dibuja las porciones de la ruleta
        function drawWheel() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = Math.min(centerX, centerY);

            if (options.length === 0) {
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
                ctx.fillStyle = '#F8FAFC';
                ctx.fill();
                ctx.lineWidth = 6;
                ctx.strokeStyle = '#E2E8F0';
                ctx.stroke();

                ctx.fillStyle = '#94A3B8';
                ctx.font = '28px Inter, sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('Añade opciones', centerX, centerY - 100);
                return;
            }

            const arcSize = (2 * Math.PI) / options.length;

            options.forEach((opt, i) => {
                const angleStart = i * arcSize;
                const angleEnd = angleStart + arcSize;

                // Dibujar fondo
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, angleStart, angleEnd);
                ctx.closePath();
                ctx.fillStyle = colors[i % colors.length];
                ctx.fill();

                // Bordes divisorios blancos para que respire
                ctx.lineWidth = 3;
                ctx.strokeStyle = '#FFFFFF';
                ctx.stroke();

                // Textos bien colocados
                ctx.save();
                ctx.translate(centerX, centerY);
                const textAngle = angleStart + arcSize / 2;
                ctx.rotate(textAngle);

                // --- Ajuste dinámico de la fuente para estar seguros de que entra ---
                let fontSize = 36;
                if (options.length > 8) fontSize = 28;
                if (options.length > 15) fontSize = 20;
                if (options.length > 25) fontSize = 16;

                ctx.fillStyle = '#FFFFFF';
                ctx.font = `bold ${fontSize}px Inter, sans-serif`;
                ctx.textAlign = 'right';
                ctx.textBaseline = 'middle'; // Centrado verticalmente a la perfección

                // Sombra sutil para lectura sin ser estruendosa
                ctx.shadowColor = 'rgba(0,0,0,0.3)';
                ctx.shadowBlur = 3;
                ctx.shadowOffsetX = 1;
                ctx.shadowOffsetY = 1;

                let displayText = opt;
                // Si la cadena es excesiva, la acortamos
                if (displayText.length > 22) {
                    displayText = displayText.substring(0, 19) + '...';
                }

                // Pintamos alejados un poco del borde (radius - 40)
                ctx.fillText(displayText, radius - 40, 0);
                ctx.restore();
            });
        }

        function addOption() {
            if (isSpinning) return;
            const val = optionInput.value.trim();
            if (val) {
                options.push(val);
                optionInput.value = '';
                renderList();
                drawWheel();
            }
        }

        addBtn.addEventListener('click', addOption);
        optionInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addOption();
        });

        // Configuración de la trampa
        function determineWinnerIndex() {
            let riggedIndices = [];
            for (let i = 0; i < options.length; i++) {
                if (riggedPatterns.test(options[i].trim())) {
                    riggedIndices.push(i);
                }
            }

            if (riggedIndices.length > 0) {
                if (riggedIndices.includes(1)) return 1;
                return riggedIndices[0];
            }
            return Math.floor(Math.random() * options.length);
        }

        // Animación principal
        spinBtn.addEventListener('click', () => {
            if (options.length === 0 || isSpinning) return;
            isSpinning = true;
            spinBtn.disabled = true;

            const winnerIndex = determineWinnerIndex();
            winningIndexForRemoval = winnerIndex;

            const sliceDeg = 360 / options.length;
            const winnerAngleCenter = (winnerIndex * sliceDeg) + (sliceDeg / 2);

            const baseSpins = 6 + Math.floor(Math.random() * 4);
            const totalSpinsDegrees = baseSpins * 360;

            const variance = (Math.random() * 0.8 - 0.4) * sliceDeg;

            const targetFinalRotation = 360 - winnerAngleCenter + variance;
            const modCurrent = currentRotation % 360;
            const absoluteRotation = currentRotation + totalSpinsDegrees + targetFinalRotation - modCurrent;

            currentRotation = absoluteRotation;
            const spinDurationMS = 5500 + Math.random() * 1500;

            canvas.style.transition = `transform ${spinDurationMS}ms cubic-bezier(0.1, 0.9, 0.2, 1)`;
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                showWinner(options[winnerIndex]);
                triggerConfetti();
            }, spinDurationMS + 300);
        });

        // Completado
        function showWinner(winnerName) {
            winnerText.textContent = winnerName;
            winnerModal.classList.add('active');
        }

        closeModalBtn.addEventListener('click', () => {
            winnerModal.classList.remove('active');
            isSpinning = false;
            spinBtn.disabled = false;

            if (winningIndexForRemoval !== -1 && options.length > 0) {
                options.splice(winningIndexForRemoval, 1);
                winningIndexForRemoval = -1;
                renderList();

                canvas.style.transition = 'none';
                currentRotation = 0;
                canvas.style.transform = `rotate(0deg)`;

                void canvas.offsetWidth;
                drawWheel();
            }
        });

        // Confeti
        function triggerConfetti() {
            var duration = 3.5 * 1000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: colors, zIndex: 200 });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: colors, zIndex: 200 });

                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        // INIT
        drawWheel();
    </script>
</body>

</html>
